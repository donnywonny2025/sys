            pushState();
        }

        // Sidebar Mute All / Unmute All
        function muteAllCells() { muteAll(); }
        function unmuteAllCells() {
            // Unmute the first on-air cell if any
            // No automatic soloing — respect manual control
            // if (onAir.length > 0) soloAudio('cell', onAir[0]);
        }


        function removeFromStage(idx) {
            const i = onAir.indexOf(idx);
            if (i === -1) return;
            onAir.splice(i, 1);
            const cell = document.querySelector(`.stage-cell[data-idx="${idx}"]`);
            if (cell) {
                cell.style.transition = 'all 0.2s var(--spring)';
                cell.style.transform = 'scale(0.85)';
                cell.style.opacity = '0';
                setTimeout(() => { cell.remove(); updateStageGrid(); }, 200);
            } else { updateStageGrid(); }
            pushState();
        }

        function clearStage() {
            onAir.length = 0;
            const stage = document.getElementById('stage');
            // Remove only stage cells, keep drop-zones div
            stage.querySelectorAll('.stage-cell').forEach(c => c.remove());
            stage.className = 'empty';
            stage.style.gridTemplateColumns = '';
            stage.style.gridTemplateRows = '';
            pushState();
        }

        function selectAll() {
            const visible = STREAMS.filter(REGIONS[filter].filter);
            const stage = document.getElementById('stage');
            visible.slice(0, 9).forEach(s => {
                const idx = STREAMS.indexOf(s);
                if (!onAir.includes(idx)) addToStage(idx);
            });
        }

        function updateStageGrid() {
            const stage = document.getElementById('stage');
            const count = onAir.length;
            if (count === 0) {
                stage.className = 'empty';
                stage.style.gridTemplateColumns = '';
                stage.style.gridTemplateRows = '';
                return;
            }
            stage.className = '';
            stage.id = 'stage';
            if (count === 1) { stage.style.gridTemplateColumns = '1fr'; stage.style.gridTemplateRows = '1fr'; }
            else if (count === 2) { stage.style.gridTemplateColumns = '1fr 1fr'; stage.style.gridTemplateRows = '1fr'; }
            else if (count <= 4) { stage.style.gridTemplateColumns = '1fr 1fr'; stage.style.gridTemplateRows = '1fr 1fr'; }
            else if (count <= 6) { stage.style.gridTemplateColumns = '1fr 1fr 1fr'; stage.style.gridTemplateRows = '1fr 1fr'; }
            else { stage.style.gridTemplateColumns = '1fr 1fr 1fr'; stage.style.gridTemplateRows = `repeat(${Math.ceil(count / 3)}, 1fr)`; }
        }

        // ── SORTABLE (Stage) — Smart Drop Zone System ──

        function initSortable() {
            const stage = document.getElementById('stage');

            // Reorder + receive from dock via SortableJS
            new Sortable(stage, {
                group: { name: 'director', put: true },
                animation: 300,
                easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                ghostClass: 'sortable-ghost',
                onAdd: (evt) => {
                    const cloned = evt.item;
                    const idx = parseInt(cloned.dataset.idx);
                    cloned.remove();
                    if (!onAir.includes(idx)) {
                        addToStage(idx);
                    }
                },
                onSort: () => {
                    const cells = document.querySelectorAll('.stage-cell');
                    onAir.length = 0;
                    cells.forEach(c => onAir.push(parseInt(c.dataset.idx)));
                    pushState();
                }
            });
        }


        // ── DROP ZONE STUBS (kept for compatibility with dragend handlers) ──
        function hideDropZones() { /* no-op: drop zone overlay removed */ }

        // ── PRESETS ──
        function buildPresets() {
            const list = document.getElementById('presetList');
            list.innerHTML = '';
            for (const name of Object.keys(PRESETS)) {
                const btn = document.createElement('button');
                btn.className = 'preset-btn';
                btn.textContent = name;
                btn.onclick = () => loadPreset(name);
                list.appendChild(btn);
            }
        }

        function loadPreset(name) {
            const labels = PRESETS[name];
            if (!labels) return;
            const wantedIndices = labels.map(l => STREAMS.findIndex(s => s.label === l)).filter(i => i >= 0);
            const toRemove = onAir.filter(idx => !wantedIndices.includes(idx));
            const toAdd = wantedIndices.filter(idx => !onAir.includes(idx));

            toRemove.forEach(idx => {
                const i = onAir.indexOf(idx);
                if (i !== -1) onAir.splice(i, 1);
                const cell = document.querySelector(`.stage-cell[data-idx="${idx}"]`);
                if (cell) cell.remove();
            });
            toAdd.forEach(idx => addToStage(idx));

            const stage = document.getElementById('stage');
            wantedIndices.forEach(idx => {
                const cell = stage.querySelector(`.stage-cell[data-idx="${idx}"]`);
                if (cell) stage.appendChild(cell);
            });
            onAir.length = 0;
            onAir.push(...wantedIndices);
            updateStageGrid();
            pushState();

            document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent === name));
        }

        // ── AUDIO LIST ──
        function updateAudioList() {
            const el = document.getElementById('audioList');
            if (!el) return;
            el.innerHTML = '';
            onAir.forEach(idx => {
                const s = STREAMS[idx];
                const isFocused = _audioFocus && _audioFocus.type === 'cell' && _audioFocus.idx === idx;
                const row = document.createElement('div');
                row.className = 'audio-row';
                row.innerHTML = `
            <span class="audio-row__label">${s.flag || ''} ${s.label}</span>
            <button class="audio-row__btn ${isFocused ? 'active' : ''}" title="Toggle Audio">${isFocused ? '🔊' : '🔇'}</button>
        `;
                row.querySelector('.audio-row__btn').addEventListener('click', function () {
                    if (_audioFocus && _audioFocus.type === 'cell' && _audioFocus.idx === idx) {
                        muteAll();
                    } else {
                        soloAudio('cell', idx);
                    }
                    updateAudioList();
                });
                el.appendChild(row);
            });
            if (onAir.length === 0) {
                el.innerHTML = '<div style="font-size:10px;color:var(--muted);text-align:center;padding:4px;">No sources on air</div>';
            }
        }



        // ═══ REMOTION OVERLAY PLAYER ═══
        // Plays pre-rendered transparent WebM overlays on the stage
        var _remotionOverlays = {
            'drop': '/assets/overlays/breaking-news.webm',
            'flash': '/assets/overlays/alert-flash.webm',
            'stinger': '/assets/overlays/stinger.webm',
        };

        function playRemotionOverlay(src) {
            var stage = document.getElementById('stage');
            if (!stage) return;
            var video = document.createElement('video');
            video.src = src;
            video.autoplay = true;
            video.muted = true;
            video.playsInline = true;
            video.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:100;pointer-events:none;object-fit:cover;';
            video.addEventListener('ended', function () { video.remove(); });
            video.addEventListener('error', function () { video.remove(); });
            // Safety: remove after max 10s
            setTimeout(function () { if (video.parentNode) video.remove(); }, 10000);
            stage.appendChild(video);
            video.play().catch(function () { video.remove(); });
        }

        // ═══ BROADCAST GRAPHIC CONTROLS ═══
        function pushLowerThird() {
            var tag = document.getElementById('ltTagInput').value;
            var text = document.getElementById('ltTextInput').value;

            var btn = event && event.currentTarget;
            if (btn) {
                btn.classList.add('firing');
                setTimeout(function () { btn.classList.remove('firing'); }, 200);
            }
            // Send payload formatted for the TT News layout receiver
            sendCmd('lower_third', { tag: tag, text: text });
        }

        function removeLowerThird() {
            var btn = event && event.currentTarget;
            if (btn) {
                btn.classList.add('firing');
                setTimeout(function () { btn.classList.remove('firing'); }, 200);
            }
            sendCmd('hide_lower_third', {});
        }

        // ═══ BROADCAST EFFECTS ENGINE ═══
        function playEffect(type) {
            var stage = document.getElementById('stage');
            var overlay = document.getElementById('effectsOverlay');
            if (!overlay) return;

            // Clear any existing effects
            overlay.innerHTML = '';
            stage.classList.remove('fx-shake', 'fx-zoom');

            // Flash the button
            var btn = event && event.currentTarget;
            if (btn) {
                btn.classList.add('firing');
                setTimeout(function () { btn.classList.remove('firing'); }, 200);
            }

            // Try Remotion WebM overlay first for supported effects
            if (_remotionOverlays[type]) {
                playRemotionOverlay(_remotionOverlays[type]);
                // Also add CSS effect for extra punch
                if (type === 'stinger') {
                    stage.classList.add('fx-shake');
                    stage.addEventListener('animationend', function () {
                        stage.classList.remove('fx-shake');
                    }, { once: true });
                }
                sendCmd('effect', { type: type });
                return;
            }

            // CSS-only effects (fallback or native)
            switch (type) {
                case 'shake':
                    stage.classList.add('fx-shake');
                    stage.addEventListener('animationend', function () {
                        stage.classList.remove('fx-shake');
                    }, { once: true });
                    break;

                case 'zoom':
                    stage.classList.add('fx-zoom');
                    stage.addEventListener('animationend', function () {
                        stage.classList.remove('fx-zoom');
                    }, { once: true });
                    break;

                case 'curtain':
                    var top = document.createElement('div');
                    top.className = 'fx-curtain-top';
                    var bot = document.createElement('div');
                    bot.className = 'fx-curtain-bottom';
                    overlay.appendChild(top);
                    overlay.appendChild(bot);
                    setTimeout(function () { overlay.innerHTML = ''; }, 2800);
                    break;
            }

            // Also send to broadcast viewers
            sendCmd('effect', { type: type });
        }

        // ═══ TT NEWS OPERATIONS ═══
        function announceNews(text) {
            if (!text.trim()) return;
            var btn = event && event.currentTarget;
            if (btn) {
                btn.classList.add('firing');
                setTimeout(function () { btn.classList.remove('firing'); }, 200);
            }

            fetch('/api/tts/announce', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            })
                .then(res => res.json())
                .then(data => console.log("TTS Triggered:", data))
                .catch(err => console.error("TTS Error:", err));
        }

        function stopAnnouncer() {
            var btn = event && event.currentTarget;
            if (btn) {
                btn.classList.add('firing');
                setTimeout(function () { btn.classList.remove('firing'); }, 200);
            }

            fetch('/api/tts/stop', { method: 'POST' })
                .then(res => res.json())
                .then(data => console.log("TTS Stopped:", data))
                .catch(err => console.error("TTS Stop Error:", err));
        }

        function updateTickerList(str) {
            if (!str.trim()) return;
            var btn = event && event.currentTarget;
            if (btn) {
                btn.classList.add('firing');
                setTimeout(function () { btn.classList.remove('firing'); }, 200);
            }

            var items = str.split(',').map(s => s.trim()).filter(s => s);
            sendCmd('ticker', { items: items });
            document.getElementById('tickerInput').value = '';
        }


        // ═══ SOUND FX ENGINE (Web Audio API) ═══
        var _audioCtx = null;
        function getAudioCtx() {
            if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return _audioCtx;
        }

        function playSoundFX(type) {
            var ctx = getAudioCtx();
            var now = ctx.currentTime;

            // Flash the button
            if (event && event.currentTarget) {
                var btn = event.currentTarget;
                btn.classList.add('firing');
                setTimeout(function () { btn.classList.remove('firing'); }, 200);
            }

            switch (type) {
                case 'alert': {
                    // Emergency alarm — two-tone siren
                    var osc = ctx.createOscillator();
                    var gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(880, now);
                    osc.frequency.setValueAtTime(660, now + 0.15);
                    osc.frequency.setValueAtTime(880, now + 0.3);
                    osc.frequency.setValueAtTime(660, now + 0.45);
                    osc.frequency.setValueAtTime(880, now + 0.6);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.connect(gain).connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.8);
                    break;
                }
                case 'chime': {
                    // Pleasant three-note ascending chime
                    [523, 659, 784].forEach(function (freq, i) {
                        var osc = ctx.createOscillator();
                        var gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0, now + i * 0.12);
                        gain.gain.linearRampToValueAtTime(0.2, now + i * 0.12 + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.5);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now + i * 0.12);
                        osc.stop(now + i * 0.12 + 0.5);
                    });
                    break;
                }
                case 'whoosh': {
                    // Swoosh — filtered noise sweep
                    var bufferSize = ctx.sampleRate * 0.4;
                    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    var data = buffer.getChannelData(0);
                    for (var i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    var noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    var filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(200, now);
                    filter.frequency.exponentialRampToValueAtTime(4000, now + 0.15);
                    filter.frequency.exponentialRampToValueAtTime(100, now + 0.4);
                    filter.Q.value = 2;
                    var gain = ctx.createGain();
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    noise.connect(filter).connect(gain).connect(ctx.destination);
                    noise.start(now);
                    break;
                }
                case 'boom': {
                    // Deep impact — low frequency burst with distortion
                    var osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
                    var gain = ctx.createGain();
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    // Add noise for texture
                    var bufferSize = ctx.sampleRate * 0.3;
                    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    var data = buffer.getChannelData(0);
                    for (var i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    var noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    var nGain = ctx.createGain();
                    nGain.gain.setValueAtTime(0.15, now);
                    nGain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    var lpf = ctx.createBiquadFilter();
                    lpf.type = 'lowpass';
                    lpf.frequency.value = 200;
                    osc.connect(gain).connect(ctx.destination);
                    noise.connect(lpf).connect(nGain).connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.6);
                    noise.start(now);
                    break;
                }
            }
            // Also send to broadcast
            sendCmd('sfx', { sound: type });
        }

        // ── KEYBOARD SHORTCUTS ──
        document.addEventListener('keydown', function (e) {
            // Don't trigger shortcuts when typing in inputs
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            switch (e.key) {
                case 'Escape':
                    closePreview();
                    break;
                case 'm':
                case 'M':
                    muteAll();
                    break;
            }
        });

        // Close panels on outside click
        document.addEventListener('click', (e) => {
            // nothing to do now since panels are permanent
        });
    </script>
